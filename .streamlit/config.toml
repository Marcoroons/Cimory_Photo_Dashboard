# Theme for the Photo Review dashboard. Safe to commit, holds no secrets.
[theme]
primaryColor = "#7c3aed"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f4f4f8"
textColor = "#1f2430"
font = "sans serif"

[server]
# Weekly batch files can be a few MB, give some headroom.
maxUploadSize = 50

[browser]
gatherUsageStats = false
